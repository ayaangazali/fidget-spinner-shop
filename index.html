<!DOCTYPE html>
<html>
<head>
<title>Fidget Spinner Shop</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<div id="header">
  <h1>Fidget Spinner Shop</h1>
  <p>The #1 Place To Buy Fidget Spinners!</p>
</div>

<div id="nav">
  <a href="index.html">Home</a>
  <a href="cart.html">Cart</a>
</div>

<div id="content">

  <h2>Our Spinners</h2>

  <div id="productList"></div>

  <div class="clear"></div>

</div>

<script src="products.js"></script>
<script>
// build the product grid
var html = "";
for (var i = 0; i < products.length; i++) {
  var p = products[i];
  html += '<div class="product">';
  html += '<img src="' + p.image + '" alt="' + p.name + '">';
  html += '<h3>' + p.name + '</h3>';
  html += '<p class="price">$' + p.price + '</p>';
  html += '</div>';
}
document.getElementById("productList").innerHTML = html;
</script>

</body>
</html>
