<!DOCTYPE html>
<html>
<head>
<title>Fidget Spinner Shop - Best Spinners Online!</title>
<link rel="stylesheet" type="text/css" href="style.css">
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
</head>
<body>

<div id="header">
  <h1>Fidget Spinner Shop</h1>
  <p>The #1 Place To Buy Fidget Spinners!</p>
</div>

<div id="nav">
  <a href="index.html">Home</a>
  <a href="cart.html">Cart</a>
</div>

<div id="saleBanner">
  ★ BIG SALE!! Use code SPIN10 for 10% OFF your order!! ★
</div>

<div id="content">

  <h2>Our Spinners</h2>

  <div id="productList"></div>

  <div class="clear"></div>

</div>

<div id="footer">
  <p>Copyright 2018 Fidget Spinner Shop. All Rights Reserved.</p>
</div>

<script src="products.js"></script>
<script src="cart.js"></script>
<script>
// build the product grid
var html = "";
for (var i = 0; i < products.length; i++) {
  var p = products[i];
  html += '<div class="product">';
  html += '<img src="' + p.image + '" alt="' + p.name + '">';
  html += '<h3>' + p.name + '</h3>';
  html += '<p class="price">$' + p.price + '</p>';
  html += '<p><a href="product.html?id=' + p.id + '">View Details</a></p>';
  html += '<button onclick="addToCart(' + p.id + ')">Add to Cart</button>';
  html += '</div>';
}
document.getElementById("productList").innerHTML = html;

$(document).ready(function(){
  console.log("page loaded");
});
</script>

</body>
</html>
