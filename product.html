<!DOCTYPE html>
<html>
<head>
<title>Product Details - Fidget Spinner Shop</title>
<link rel="stylesheet" type="text/css" href="style.css">
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
</head>
<body>

<div id="header">
  <h1>Fidget Spinner Shop</h1>
  <p>The #1 Place To Buy Fidget Spinners!</p>
</div>

<div id="nav">
  <a href="index.html">Home</a>
  <a href="cart.html">Cart</a>
</div>

<div id="content">

  <div id="productDetail"></div>

</div>

<script src="products.js"></script>
<script src="cart.js"></script>
<script>
// get the id from the url
function getQueryId() {
  var q = window.location.search;
  q = q.replace("?", "");
  var parts = q.split("=");
  return parts[1];
}

var theId = getQueryId();
var p = getProductById(theId);

if (p == null) {
  document.getElementById("productDetail").innerHTML = "<p>Sorry, product not found!</p>";
} else {
  var html = "";
  html += '<h2>' + p.name + '</h2>';
  html += '<p class="price">$' + p.price + '</p>';
  html += '<p>This is an awesome fidget spinner! Spins for a really long time and helps you focus. Great for kids and adults. Limited stock so buy now!</p>';
  html += '<button onclick="addToCart(' + p.id + ')">Add to Cart</button>';
  document.getElementById("productDetail").innerHTML = html;
}
</script>

</body>
</html>
